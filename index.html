<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resonite ワールド検索</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Resonite ワールド検索</h1>

  <div class="search-box">
    <div class="row">
      <label>タグ</label>
      <input type="text" id="tags" value="chill" placeholder="タグをカンマ区切りで入力 (例: japan,game)" />
    </div>
    <div class="row">
      <label>件数上限</label>
      <input type="number" id="count" value="25" min="1" max="25" style="max-width:120px" />
      <label>ソート</label>
      <select id="sortBy">
        <option value="TotalVisits">訪問数</option>
        <option value="CreationDate">作成日</option>
        <option value="LastUpdateDate">更新日</option>
        <option value="FirstPublishTime" selected>公開日</option>
        <option value="Name">名前</option>
        <option value="Random">ランダム</option>
      </select>
      <select id="sortDir">
        <option value="Descending" selected>降順</option>
        <option value="Ascending">昇順</option>
      </select>
    </div>
    <div class="row">
      <label style="min-width:auto"><input type="checkbox" id="showCreationDate" /> 作成日を表示/CSV出力</label>
    </div>
    <div class="row" style="justify-content:center">
      <button class="btn-search" id="searchBtn" onclick="doSearch()">検索</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="results-header" id="resultsHeader" style="display:none">
    <span id="resultCount"></span>
    <button class="btn-csv" onclick="downloadCSV()">CSVダウンロード</button>
  </div>

  <table id="resultsTable" style="display:none">
    <thead>
      <tr>
        <th>リンク</th>
        <th>ワールド名</th>
        <th>オーナー</th>
        <th>MMCエントリー</th>
        <th colspan="2">メインカテゴリ</th>
        <th>訪問数</th>
        <th>公開日</th>
        <th class="col-creation" style="display:none">作成日</th>
        <th>更新日</th>
        <th>タグ</th>
        <th>URI</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  </table>

  <div class="results-footer" id="resultsFooter" style="display:none">
    <button class="btn-more" id="moreBtn" onclick="doSearch(currentOffset + lastCount)">次のページを読み込む</button>
  </div>

  <script src="app.js"></script>
</body>

</html>
